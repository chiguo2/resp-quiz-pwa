<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>教科書参照</title>
  <link rel="stylesheet" href="reference-viewer.css?v=66">
</head>
<body>
  <header>
    <button id="closeBtn" type="button" aria-label="閉じる">閉じる</button>
    <div><small>問題解説・閲覧専用</small><h1 id="docTitle">教科書参照</h1></div>
    <span id="pageLabel"></span>
  </header>
  <main>
    <div id="notice" class="notice">添付PDFの該当ページを表示しています。本文の文字は選択・コピーできます（OCR由来のため一部に誤認識が含まれることがあります）。</div>
    <div class="toolbar">
      <button id="zoomOut" type="button">－</button>
      <span id="zoomLabel">100%</span>
      <button id="zoomIn" type="button">＋</button>
      <button id="fitBtn" type="button">幅に合わせる</button>
      <button id="hlToggle" type="button" aria-pressed="false">🖍 ハイライト</button>
      <button id="hlClear" type="button">消去</button>
    </div>
    <div id="stage" class="stage">
      <div id="canvasWrap" class="canvas-wrap">
        <canvas id="pageCanvas"></canvas>
        <div id="textLayer" class="textLayer"></div>
        <div id="hlLayer" class="hl-layer"></div>
      </div>
    </div>
    <p id="error" class="error hidden">参照ページを表示できませんでした。</p>
  </main>
  <script src="assets/vendor/pdfjs/pdf.min.js?v=66"></script>
  <script src="reference-viewer.js?v=66"></script>
</body>
</html>
